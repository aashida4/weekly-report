services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: weekly-report:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/data/app.db"
      NODE_ENV: "production"
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
