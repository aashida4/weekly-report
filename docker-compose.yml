services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: weekly-report:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/data/app.db"
      NODE_ENV: "production"
    volumes:
      - app_data:/data
    # On Linux hosts, host.docker.internal isn't resolved by default
    # (Docker Desktop on Mac/Windows adds it automatically). This makes
    # OLLAMA_BASE_URL=http://host.docker.internal:11434 work everywhere.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  app_data:
