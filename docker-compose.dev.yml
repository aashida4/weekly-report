services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: weekly-report:dev
    environment:
      DATABASE_URL: "file:/data/app.db"
      NODE_ENV: "development"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_data:/data

volumes:
  app_node_modules:
